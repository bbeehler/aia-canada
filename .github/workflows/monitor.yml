name: Daily Media Monitoring Sync

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: 
    inputs:
      timeframe:
        description: 'Timeframe for search results'
        required: false
        default: 'qdr:w' # Default to past week for manual runs
        type: string

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository files
        uses: actions/checkout@v6

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Monitor and Push to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          # The '||' forces scheduled runs to use 'qdr:d' (Past 24 Hours)
          TIMEFRAME_INPUT: ${{ github.event.inputs.timeframe || 'qdr:d' }}
        run: python fetch_mentions.py
